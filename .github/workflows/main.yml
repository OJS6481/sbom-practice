name: SBOM-Automation-Lab

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드를 서버로 가져오기
        uses: actions/checkout@v4 # 최신 v4로 업그레이드 (첫 번째 경고 해결)

      - name: SBOM 생성 (Syft)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: "my-app.sbom.json"

      - name: 취약점 스캔하기 (Grype)
        uses: anchore/scan-action@v3
        with:
          sbom: "my-app.sbom.json"
          fail-build: false
          # db-update 대신 이 옵션을 넣거나 아예 비워두면 v3가 알아서 처리합니다.
