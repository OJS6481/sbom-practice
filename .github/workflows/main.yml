name: SBOM-Automation-Lab

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드를 서버로 가져오기
        uses: actions/checkout@v4

      - name: SBOM 생성 (Syft)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: "my-app.sbom.json"

      - name: 취약점 스캔하기 (Grype)
        uses: anchore/scan-action@v3
        with:
          sbom: "my-app.sbom.json"
          fail-build: false
          # 복잡한 옵션들을 모두 제거했습니다. v3가 알아서 DB를 업데이트합니다.
