name: SBOM-Automation-Lab

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드를 서버로 가져오기
        uses: actions/checkout@v4

      - name: SBOM 생성 (Syft)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: "my-app.sbom.json"

      - name: 최신 취약점 DB 강제 업데이트 및 스캔
        run: |
          # Grype 설치 및 DB 업데이트 후 실행
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype db update
          grype sbom:my-app.sbom.json
